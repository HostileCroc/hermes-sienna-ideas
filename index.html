<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sienna Content Ideas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, #e1306c, #fd1d1d, #f56040); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat { background: #1a1a1a; padding: 15px 20px; border-radius: 12px; border: 1px solid #333; }
        .stat-num { font-size: 1.5rem; font-weight: bold; color: #e1306c; }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-btn { padding: 8px 16px; border: 1px solid #333; background: transparent; color: #e0e0e0; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover, .filter-btn.active { background: #e1306c; border-color: #e1306c; color: white; }
        .idea-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 15px; transition: all 0.2s; }
        .idea-card:hover { border-color: #e1306c; }
        .idea-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
        .idea-title { font-size: 1.1rem; font-weight: 600; }
        .idea-id { color: #666; font-size: 0.8rem; }
        .idea-desc { color: #aaa; line-height: 1.6; margin-bottom: 15px; }
        .idea-footer { display: flex; justify-content: space-between; align-items: center; }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; text-transform: uppercase; font-weight: 600; }
        .status-pending { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
        .status-wip { background: #3b82f622; color: #3b82f6; border: 1px solid #3b82f644; }
        .status-done { background: #10b98122; color: #10b981; border: 1px solid #10b98144; }
        .status-shelved { background: #6b728022; color: #6b7280; border: 1px solid #6b728044; }
        .idea-date { color: #666; font-size: 0.8rem; }
        .idea-notes { margin-top: 10px; padding: 10px; background: #111; border-radius: 8px; font-size: 0.85rem; color: #888; border-left: 3px solid #e1306c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sienna Content Ideas</h1>
        <p class="subtitle">Instagram Reels & Posts Dashboard</p>
        
        <div class="stats">
            <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
            <div class="stat"><div class="stat-num" id="pendingCount">0</div><div class="stat-label">Pending</div></div>
            <div class="stat"><div class="stat-num" id="wipCount">0</div><div class="stat-label">In Progress</div></div>
            <div class="stat"><div class="stat-num" id="doneCount">0</div><div class="stat-label">Done</div></div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="wip">In Progress</button>
            <button class="filter-btn" data-filter="done">Done</button>
            <button class="filter-btn" data-filter="shelved">Shelved</button>
        </div>

        <div id="ideasContainer"></div>
    </div>

    <script>
        let ideas = [];
        let currentFilter = 'all';

        async function loadIdeas() {
            const res = await fetch('ideas.json?t=' + Date.now());
            const data = await res.json();
            ideas = data.ideas;
            render();
        }

        function render() {
            const filtered = currentFilter === 'all' ? ideas : ideas.filter(i => i.status === currentFilter);
            
            document.getElementById('totalCount').textContent = ideas.length;
            document.getElementById('pendingCount').textContent = ideas.filter(i => i.status === 'pending').length;
            document.getElementById('wipCount').textContent = ideas.filter(i => i.status === 'wip').length;
            document.getElementById('doneCount').textContent = ideas.filter(i => i.status === 'done').length;

            document.getElementById('ideasContainer').innerHTML = filtered.map(idea => `
                <div class="idea-card">
                    <div class="idea-header">
                        <span class="idea-title">${idea.title}</span>
                        <span class="idea-id">#${idea.id}</span>
                    </div>
                    <div class="idea-desc">${idea.description}</div>
                    ${idea.notes ? `<div class="idea-notes">${idea.notes}</div>` : ''}
                    <div class="idea-footer">
                        <span class="status status-${idea.status}">${idea.status}</span>
                        <span class="idea-date">${idea.created}</span>
                    </div>
                </div>
            `).join('');
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        loadIdeas();
    </script>
</body>
</html>
